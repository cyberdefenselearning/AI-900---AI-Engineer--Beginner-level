<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CyberDefense Dashboard - Anand Rao N</title>
    <style>
        :root { --azure: #0078D4; --bg: #0d1117; --panel: #161b22; --border: #30363d; --gold: #00ff00; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #c9d1d9; margin: 0; padding: 15px; overflow: hidden; }
        
        /* Dashboard Layout */
        .dashboard { display: grid; grid-template-columns: 300px 1fr 300px; gap: 15px; height: 95vh; }
        
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; padding: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .panel-header { color: var(--azure); font-weight: 800; font-size: 12px; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }

        /* Left Column: Config */
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; margin-bottom: 5px; color: #8b949e; }
        input { width: 100%; padding: 10px; background: #010409; border: 1px solid var(--border); color: white; border-radius: 4px; box-sizing: border-box; font-size: 12px; }

        /* Middle Column: Viewport */
        .viewport { position: relative; background: #000; flex-grow: 1; border-radius: 6px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #444; }
        #targetImg { max-width: 100%; max-height: 100%; display: none; }
        .face-box { position: absolute; border: 2px solid var(--gold); pointer-events: none; z-index: 10; }

        /* Right Column: Logs */
        #console { flex-grow: 1; font-family: 'Consolas', monospace; font-size: 11px; overflow-y: auto; color: #8b949e; line-height: 1.4; }
        .log-entry { margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid #21262d; }
        .log-entry b { color: var(--azure); }

        /* Buttons */
        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 13px; transition: 0.2s; }
        .btn-run { background: var(--azure); color: white; }
        .btn-run:hover { background: #1f8ad2; }
        .btn-reset { background: #30363d; color: white; }

        .branding-footer { position: absolute; bottom: 10px; right: 20px; font-size: 10px; color: #484f58; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="panel">
        <div class="panel-header">1. Security Credentials</div>
        <div class="input-group">
            <label>FACE API KEY</label>
            <input type="password" id="key" placeholder="Paste Key">
        </div>
        <div class="input-group">
            <label>ENDPOINT URL</label>
            <input type="text" id="endpoint" placeholder="https://...">
        </div>
        <div class="input-group">
            <label>IMAGE SOURCE URL</label>
            <input type="text" id="url" placeholder="Paste URL" oninput="preview()">
        </div>
        <div style="margin-top: auto;">
            <button class="btn btn-run" onclick="analyze()">Execute Scan</button>
            <button class="btn btn-reset" onclick="location.reload()">Reset System</button>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">2. Visual Telemetry</div>
        <div class="viewport" id="viewport">
            <img id="targetImg" crossorigin="anonymous">
            <div id="msg">AWAITING FEED...</div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">3. Forensic Logs</div>
        <div id="console">
            <div class="log-entry"><b>[SYSTEM]</b> Initialized.</div>
            <div class="log-entry"><b>[USER]</b> Anand Rao N</div>
        </div>
    </div>
</div>

<div class="branding-footer">Cyberdefenselearning.com | Adaptive Intelligence Hub</div>

<script>
    function preview() {
        const url = document.getElementById('url').value.trim();
        const img = document.getElementById('targetImg');
        const msg = document.getElementById('msg');
        if(url.length > 5) {
            img.src = url; img.style.display = 'block'; msg.style.display = 'none';
            document.querySelectorAll('.face-box').forEach(b => b.remove());
        }
    }

    async function analyze() {
        const key = document.getElementById('key').value.trim();
        let endpoint = document.getElementById('endpoint').value.trim().replace(/\/+$/, "");
        const imgUrl = document.getElementById('url').value.trim();
        const logger = document.getElementById('console');

        if(!key || !endpoint || !imgUrl) return alert("Missing Parameters");

        logger.innerHTML += `<div class="log-entry"><b>[STATUS]</b> Contacting API...</div>`;
        document.querySelectorAll('.face-box').forEach(b => b.remove());

        const params = new URLSearchParams({
            "detectionModel": "detection_03",
            "returnFaceId": "false",
            "returnFaceAttributes": "mask,glasses" 
        });

        try {
            const res = await fetch(`${endpoint}/face/v1.0/detect?${params}`, {
                method: 'POST',
                headers: { 'Ocp-Apim-Subscription-Key': key, 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: imgUrl })
            });
            const data = await res.json();

            if(data.error) {
                logger.innerHTML += `<div class="log-entry" style="color:#ff7b72"><b>[ERROR]</b> ${data.error.message}</div>`;
            } else {
                logger.innerHTML += `<div class="log-entry"><b>[DATA]</b> ${data.length} Subjects.</div>`;
                render(data);
            }
        } catch(e) { logger.innerHTML += `<div class="log-entry"><b>[FAIL]</b> Network error.</div>`; }
        logger.scrollTop = logger.scrollHeight;
    }

    function render(faces) {
        const img = document.getElementById('targetImg');
        const viewport = document.getElementById('viewport');
        const scaleX = img.clientWidth / img.naturalWidth;
        const scaleY = img.clientHeight / img.naturalHeight;

        faces.forEach((f, i) => {
            const box = document.createElement('div');
            box.className = 'face-box';
            box.style.left = (f.faceRectangle.left * scaleX + img.offsetLeft) + 'px';
            box.style.top = (f.faceRectangle.top * scaleY + img.offsetTop) + 'px';
            box.style.width = (f.faceRectangle.width * scaleX) + 'px';
            box.style.height = (f.faceRectangle.height * scaleY) + 'px';
            viewport.appendChild(box);
            document.getElementById('console').innerHTML += `<div class="log-entry"><b>[SUBJ_${i+1}]</b> Mask: ${f.faceAttributes.mask.type}</div>`;
        });
    }
</script>
</body>
</html>
