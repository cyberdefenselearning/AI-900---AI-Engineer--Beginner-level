<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CyberDefense Vision Dashboard - Anand Rao N</title>
    <style>
        :root { --azure: #0078D4; --bg: #0d1117; --panel: #161b22; --border: #30363d; --gold: #00ff00; --text: #c9d1d9; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; height: 100vh; overflow: hidden; box-sizing: border-box; }
        
        /* Persistent Branding Header */
        .main-header { display: flex; justify-content: space-between; align-items: center; background: var(--panel); border: 1px solid var(--border); padding: 10px 20px; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .brand-box { display: flex; flex-direction: column; }
        .brand-title { color: var(--azure); font-weight: 900; font-size: 20px; letter-spacing: 1.5px; }
        .brand-sub { font-size: 10px; color: #8b949e; letter-spacing: 2px; }
        .architect-tag { text-align: right; border-right: 4px solid var(--azure); padding-right: 15px; }
        .architect-name { font-weight: bold; color: white; font-size: 16px; }

        /* Dashboard Grid */
        .dashboard { display: grid; grid-template-columns: 280px 1fr 280px; gap: 10px; height: calc(100% - 75px); }
        
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; padding: 15px; position: relative; }
        .panel-title { color: var(--azure); font-weight: 800; font-size: 11px; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 5px; opacity: 0.8; }

        /* Form Styling */
        .field { margin-bottom: 12px; }
        label { display: block; font-size: 9px; margin-bottom: 4px; color: #8b949e; font-weight: bold; }
        input { width: 100%; padding: 8px; background: #010409; border: 1px solid var(--border); color: white; border-radius: 4px; box-sizing: border-box; font-size: 12px; }

        /* Center Viewport */
        .viewport { position: relative; background: #000; flex-grow: 1; border-radius: 6px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #444; }
        #targetImg { max-width: 100%; max-height: 100%; display: none; }
        .face-box { position: absolute; border: 2px solid var(--gold); box-shadow: 0 0 10px var(--gold); pointer-events: none; z-index: 10; }

        /* Right Column Logs */
        #console { flex-grow: 1; font-family: 'Consolas', 'Courier New', monospace; font-size: 11px; overflow-y: auto; color: #8b949e; }
        .log-entry { margin-bottom: 5px; padding: 4px 0; border-bottom: 1px solid #21262d; }
        .log-entry b { color: var(--gold); }

        /* Action Buttons */
        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 8px; font-size: 12px; transition: 0.3s; text-transform: uppercase; }
        .btn-run { background: var(--azure); color: white; }
        .btn-run:hover { background: #1f8ad2; box-shadow: 0 0 15px rgba(0, 120, 212, 0.5); }
        .btn-reset { background: #30363d; color: white; }
        .btn-reset:hover { background: #f85149; }
    </style>
</head>
<body>

<div class="main-header">
    <div class="brand-box">
        <span class="brand-title">CYBERDEFENSE VISION HUB</span>
        <span class="brand-sub">ANALYTICS & BIOMETRIC INTELLIGENCE</span>
    </div>
    <div class="architect-tag">
        <div style="font-size: 10px; color: var(--azure);">LEAD ARCHITECT</div>
        <div class="architect-name">Anand Rao N</div>
    </div>
</div>

<div class="dashboard">
    <div class="panel">
        <div class="panel-title">System Configuration</div>
        <div class="field">
            <label>AZURE AUTH KEY</label>
            <input type="password" id="key" placeholder="••••••••••••">
        </div>
        <div class="field">
            <label>API ENDPOINT</label>
            <input type="text" id="endpoint" placeholder="https://resource.azure.com/">
        </div>
        <div class="field">
            <label>FORENSIC IMAGE URL</label>
            <input type="text" id="url" placeholder="Paste Image URL" oninput="preview()">
        </div>
        <div style="margin-top: auto;">
            <button class="btn btn-run" onclick="analyze()">Execute Analysis</button>
            <button class="btn btn-reset" onclick="location.reload()">System Purge</button>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">Visual Telemetry</div>
        <div class="viewport" id="viewport">
            <img id="targetImg" crossorigin="anonymous">
            <div id="msg">SYSTEM READY: AWAITING INPUT</div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">Forensic Log Stream</div>
        <div id="console">
            <div class="log-entry"><b>[SECURE]</b> Dashboard Initialized...</div>
            <div class="log-entry"><b>[AUTH]</b> Architect: Anand Rao N</div>
            <div class="log-entry"><b>[SITE]</b> cyberdefenselearning.com</div>
        </div>
    </div>
</div>

<script>
    function preview() {
        const url = document.getElementById('url').value.trim();
        const img = document.getElementById('targetImg');
        const msg = document.getElementById('msg');
        if(url.length > 5) {
            img.src = url; img.style.display = 'block'; msg.style.display = 'none';
            document.querySelectorAll('.face-box').forEach(b => b.remove());
        }
    }

    async function analyze() {
        const key = document.getElementById('key').value.trim();
        let endpoint = document.getElementById('endpoint').value.trim().replace(/\/+$/, "");
        const imgUrl = document.getElementById('url').value.trim();
        const logger = document.getElementById('console');

        if(!key || !endpoint || !imgUrl) return alert("All fields required for handshake.");

        logger.innerHTML += `<div class="log-entry"><b>[SYNC]</b> Requesting Biometric data...</div>`;
        document.querySelectorAll('.face-box').forEach(b => b.remove());

        const params = new URLSearchParams({
            "detectionModel": "detection_03",
            "returnFaceId": "false",
            "returnFaceAttributes": "mask,glasses" 
        });

        try {
            const res = await fetch(`${endpoint}/face/v1.0/detect?${params}`, {
                method: 'POST',
                headers: { 'Ocp-Apim-Subscription-Key': key, 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: imgUrl })
            });
            const data = await res.json();

            if(data.error) {
                logger.innerHTML += `<div class="log-entry" style="color:#ff7b72"><b>[FAIL]</b> ${data.error.message}</div>`;
            } else {
                logger.innerHTML += `<div class="log-entry"><b>[DONE]</b> Found ${data.length} Subject(s).</div>`;
                render(data);
            }
        } catch(e) { logger.innerHTML += `<div class="log-entry" style="color:#ff7b72"><b>[ERROR]</b> Connection Interrupted.</div>`; }
        logger.scrollTop = logger.scrollHeight;
    }

    function render(faces) {
        const img = document.getElementById('targetImg');
        const viewport = document.getElementById('viewport');
        const scaleX = img.clientWidth / img.naturalWidth;
        const scaleY = img.clientHeight / img.naturalHeight;

        faces.forEach((f, i) => {
            const box = document.createElement('div');
            box.className = 'face-box';
            box.style.left = (f.faceRectangle.left * scaleX + img.offsetLeft) + 'px';
            box.style.top = (f.faceRectangle.top * scaleY + img.offsetTop) + 'px';
            box.style.width = (f.faceRectangle.width * scaleX) + 'px';
            box.style.height = (f.faceRectangle.height * scaleY) + 'px';
            viewport.appendChild(box);
            document.getElementById('console').innerHTML += `<div class="log-entry"><b>[SUBJECT_${i+1}]</b> ID: DETECTED | MASK: ${f.faceAttributes.mask.type}</div>`;
        });
    }
</script>
</body>
</html>
